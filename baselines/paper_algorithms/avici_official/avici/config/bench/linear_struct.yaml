data:
  - n_observations_obs: null
    n_observations_int: null
    graph:
      - __class__: ScaleFree
        edges_per_var: [ 4.0 ]
        power: [ 1.0 ]

      - __class__: SBM
        edges_per_var: [ 1, 2, 3 ]
        n_blocks: [ 2, 5, 10 ]
        damp: [ 0.1 ]
        
    mechanism:
      - __class__: LinearAdditive
        param:
          - __class__: SignedUniform
            low: 0.5
            high: 2.0
        bias:
          - __class__: Uniform
            low: -2.0
            high: 2.0
        noise:
          - __class__: Gaussian
        noise_scale:
          - __class__: Uniform
            low: 0.5
            high: 1.5
        n_interv_vars: [ 1.0 ]
        interv_dist:
          - __class__: SignedUniform
            low: 1.0
            high: 5.0