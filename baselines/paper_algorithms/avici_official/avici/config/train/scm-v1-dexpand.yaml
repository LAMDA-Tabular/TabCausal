---
#  
train_n_vars: [2, 3, 4, 5, 7, 10, 15, 20, 30, 40, 50, 60, 80, 100, 120, 150, 180, 200]

#  
test_n_vars: [20, 50, 100]
test_n_datasets: 5

additional_modules:
  - "./mechanism_extra.py"

data:
  - n_observations_obs: 600
    n_observations_int: 200

    # =========================================================
    # 1.   (Graph Priors)
    # =========================================================
    graph:
      - __class__: ErdosRenyi
        edges_per_var: [ 0.5, 1.0, 2.0, 4.0 ] #  

      - __class__: ScaleFree
        edges_per_var: [ 1, 2 ]
        power: [ 0.5, 1.0, 1.5 ]

      - __class__: ScaleFreeTranspose
        edges_per_var: [ 1, 2 ]
        power: [ 0.5, 1.0, 1.5 ]

      - __class__: SBM
        edges_per_var: [ 1, 2 ]
        n_blocks: [ 2, 5, 10 ]
        damp: [ 0.05, 0.2 ]

      - __class__: GRG
        radius: [ 0.08, 0.12, 0.16 ]

    # =========================================================
    # 2.   (Mechanism Priors)
    # =========================================================
    mechanism:

      # ---------------------------------------------------------
      # [Type A]   Linear ( )
      #  ： 
      # ---------------------------------------------------------
      - __class__: LinearAdditive
        
        #  ： “ ” “ ” 
        param:
          - __class__: SignedUniform
            low: 0.05
            high: 0.5   #   ( ： )
          - __class__: SignedUniform
            low: 0.5
            high: 2.0   #  
          - __class__: SignedUniform
            low: 2.0
            high: 5.0   #   ( )

        bias:
          - __class__: Uniform
            low: -2.0
            high: 2.0

        #  ， 
        noise:
          - __class__: Gaussian
          - __class__: Laplace
          - __class__: Uniform      #  
            low: -1.0
            high: 1.0
          - __class__: Exponential  #  
            scale: 1.0
          - __class__: Gumbel       #  
        
        #  
        noise_scale:
          - __class__: Uniform
            low: 0.05
            high: 0.2   #   ( )
          - __class__: Uniform
            low: 0.2
            high: 1.0   #  
          - __class__: Uniform
            low: 1.0
            high: 2.0   #   ( )
        
        n_interv_vars: [ 1.0 ]
        interv_dist:
          - __class__: SignedUniform
            low: 1.0
            high: 5.0

      # ---------------------------------------------------------
      # [Type B] Linear (  Heteroscedastic)
      #  ： ， 
      # ---------------------------------------------------------
      - __class__: LinearAdditive
        param:
          - __class__: SignedUniform
            low: 0.25
            high: 3.0
        bias:
          - __class__: Uniform
            low: -3.0
            high: 3.0
        noise:
          - __class__: Gaussian
          - __class__: Laplace
        
        #  
        noise_scale_heteroscedastic:
          - rff:
            length_scale: 10.0
            output_scale: 2.0

        n_interv_vars: [ 1.0 ]
        interv_dist:
          - __class__: SignedUniform
            low: 1.0
            high: 5.0

      # ---------------------------------------------------------
      # [Type C] RFF / GP ( /  -  )
      # ---------------------------------------------------------
      - __class__: RFFAdditive
        length_scale:
          - __class__: Uniform
            low: 7.0
            high: 12.0 #  
        output_scale:
          - __class__: Uniform
            low: 8.0
            high: 20.0
        bias:
          - __class__: Uniform
            low: -3.0
            high: 3.0
        noise:
          - __class__: Gaussian
          - __class__: Laplace
        
        #  
        noise_scale:
          - __class__: Uniform
            low: 0.5
            high: 2.0

        n_interv_vars: [ 1.0 ]
        interv_dist:
          - __class__: SignedUniform
            low: 1.0
            high: 5.0

      # ---------------------------------------------------------
      # [Type D] RFF / GP ( /  -  )
      #  ：  Notears  
      # ---------------------------------------------------------
      - __class__: RFFAdditive
        length_scale:
          - __class__: Uniform
            low: 0.5
            high: 1.5  #  
          - __class__: Uniform
            low: 1.5
            high: 3.0  #  
        output_scale:
          - __class__: Uniform
            low: 0.5
            high: 2.0
        bias:
          - __class__: Uniform
            low: -1.0
            high: 1.0
        noise:
          - __class__: Gaussian
          - __class__: Laplace
        noise_scale:
          - __class__: Uniform
            low: 0.2
            high: 1.0
        n_interv_vars: [ 1.0 ]
        interv_dist:
          - __class__: SignedUniform
            low: 1.0
            high: 3.0

      # ---------------------------------------------------------
      # [Type E] MLP   (Neural) -  
      #  ： “ ” “ ” ， 
      # ---------------------------------------------------------
      - __class__: MLPAdditive
        # 1.  ： ，  Linear  
        n_layers: [ 1 ]
        hidden_dim: [ 16, 32 ]
        activation: [ "tanh", "leaky_relu" ] #  
        
        bias:
          - __class__: Uniform
            low: -1.0
            high: 1.0
        noise:
          - __class__: Gaussian
        noise_scale:
          - __class__: Uniform
            low: 0.1
            high: 0.5 #  ， 
        n_interv_vars: [ 1.0 ]
        interv_dist:
          - __class__: SignedUniform
            low: 1.0
            high: 3.0

      - __class__: MLPAdditive
        # 2.  ： ，ReLU  
        n_layers: [ 2, 3 ]
        hidden_dim: [ 32, 64 ]
        activation: [ "relu" ] #  
        
        bias:
          - __class__: Uniform
            low: -1.0
            high: 1.0
        noise:
          - __class__: Gaussian
          - __class__: Laplace
        noise_scale:
          - __class__: Uniform
            low: 0.2
            high: 1.0
        n_interv_vars: [ 1.0 ]
        interv_dist:
          - __class__: SignedUniform
            low: 1.0
            high: 3.0

      # ---------------------------------------------------------
      # [Type F]   (Multiplicative) -  
      #  ： ， 
      # ---------------------------------------------------------
      - __class__: MultiplicativeLinear
        param:
          - __class__: SignedUniform
            low: 0.5
            high: 2.0
        bias:
          - __class__: Uniform
            low: -1.0
            high: 1.0
        noise:
          # 1.  ：  0.8~1.2   ( )
          - __class__: Uniform
            low: 0.8
            high: 1.2
          # 2.  ：  0.5~1.5   ( )
          - __class__: Uniform
            low: 0.5
            high: 1.5
        
        n_interv_vars: [ 1.0 ]
        interv_dist:
          - __class__: SignedUniform
            low: 1.0
            high: 3.0

      # ---------------------------------------------------------
      # [Type G]   (Polynomial) -  
      #  ： ， 
      # ---------------------------------------------------------
      - __class__: PolynomialAdditive
        degree: 2
        include_interaction: True
        
        #  
        param:
          - __class__: SignedUniform
            low: 0.1
            high: 0.8 
        bias:
          - __class__: Uniform
            low: -0.5
            high: 0.5
        noise:
          - __class__: Gaussian
        noise_scale:
          - __class__: Uniform
            low: 0.1
            high: 0.8
        n_interv_vars: [ 1.0 ]
        interv_dist:
          - __class__: SignedUniform
            low: 1.0
            high: 3.0 
            

      # ---------------------------------------------------------
      # [Type H]   (PNL) -  
      #  ：  Sigmoid/Tanh  ， 
      # ---------------------------------------------------------
      - __class__: PostNonLinear
        #  
        base_mechanism: 
          __class__: LinearAdditive
          param: 
            - __class__: SignedUniform
              low: 0.5
              high: 2.0
          bias:
            - __class__: Uniform
              low: -1.0
              high: 1.0
          noise:
            - __class__: Gaussian
          noise_scale:
            - __class__: Uniform
              low: 0.2
              high: 0.8
        
        #  
        nonlinearity:
          - __class__: CustomClassWrapper
            name: "Tanh"
            kwargs: {}
            paths: []
          - __class__: CustomClassWrapper
            name: "Sigmoid"
            kwargs: {}
            paths: []
          #   Cube   Exp， 

        n_interv_vars: [ 1.0 ]
        interv_dist:
          - __class__: SignedUniform
            low: 1.0
            high: 3.0